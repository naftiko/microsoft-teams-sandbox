openapi: 3.1.0
info:
  title: microsoft-teams-api
  description: |
    OpenAPI 3.1 specification covering Microsoft Teams use cases including teams and channel management, app and tab management, chat messaging, tagging, calls and meetings, workforce integration, and employee learning.
  version: 1.0.0
  contact:
    name: Microsoft Graph API
    url: https://learn.microsoft.com/en-us/graph/api/overview
servers:

  - url: http://localhost:8080/rest/microsoft-teams-api/1.0.0
    description: Sandbox   
  - url: https://graph.microsoft.com/v1.0
    description: Production
  - url: https://graph.microsoft.com/beta
    description: Beta 

security:
- oauth2: []
tags:
- name: Teams
  description: Microsoft Teams team resources and configuration
- name: Channels
  description: Team channel resources for communication and collaboration
- name: Groups
  description: Microsoft 365 groups backing Teams
- name: Tabs
  description: Channel tab resources for embedding apps and content
- name: Apps
  description: Teams app catalog resources
- name: AppInstallations
  description: Team and user app installation resources
- name: Chats
  description: One-on-one and group chat resources
- name: ChatMessages
  description: Chat and channel message resources
- name: Tags
  description: Teamwork tag resources for classifying users by attributes
- name: Calls
  description: Communication call resources for audio and video
- name: CallIvr
  description: Interactive voice response (IVR) bot call resources
- name: CallRecords
  description: Call record and session history resources
- name: OnlineMeetings
  description: Online meeting resources and scheduling
- name: Presence
  description: User presence and activity status resources
- name: WorkforceIntegrations
  description: Workforce integration resources for third-party systems
- name: Schedules
  description: Team schedule resources for shift management
- name: Shifts
  description: Employee shift and time card resources
- name: TimeOff
  description: Time off and time off reason resources
- name: EmployeeLearning
  description: Viva Learning provider and content resources
paths:
  /teams:
    get:
      tags:
      - Teams
      operationId: listTeams
      summary: List all teams
      description: Retrieve a list of teams the caller is a member of.
      parameters:
      - $ref: '#/components/parameters/Top'
      - $ref: '#/components/parameters/Skip'
      - $ref: '#/components/parameters/Filter'
      - $ref: '#/components/parameters/Select'
      responses:
        '200':
          description: A collection of teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamCollectionResponse'
              examples:
                Default:
                  summary: Successful response
                  value:
                    '@odata.count': 2
                    value:
                    - id: e1b3c5a7-9d2f-4b6e-8c1a-3f5d7e9b2a4c
                      displayName: Engineering Team
                      description: Main engineering team
                      isArchived: false
                      visibility: private
                    - id: f2c4d6b8-0e3a-5c7f-9d2b-4a6e8c1f3d5a
                      displayName: Marketing Team
                      description: Marketing and communications
                      isArchived: false
                      visibility: public
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def rules = "Default"
          return rules
    post:
      tags:
      - Teams
      operationId: createTeam
      summary: Create a team
      description: Create a new team.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Team'
      responses:
        '202':
          description: Accepted. The team is being provisioned asynchronously.
          headers:
            Location:
              description: URL to poll for team creation status.
              schema:
                type: string
                format: uri
            Content-Location:
              description: URL to the created team once provisioning completes.
              schema:
                type: string
                format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-microcks-operation:
        dispatcher: SCRIPT
        dispatcherRules: |-
          def rules = "Default"
          return rules
