name = "naftiko-microsoft-teams-sandbox"
main = "src/index.ts"
compatibility_date = "2026-05-06"
compatibility_flags = ["nodejs_compat"]

[[containers]]
class_name = "MicrosoftTeamsSandboxContainer"
image = "./Dockerfile"
instance_type = "standard-1"
max_instances = 1

[[durable_objects.bindings]]
name = "MICROSOFT_TEAMS_SANDBOX"
class_name = "MicrosoftTeamsSandboxContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MicrosoftTeamsSandboxContainer"]
