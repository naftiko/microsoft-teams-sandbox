specificationVersion: '0.19'

aid: microsoft-teams-sandbox
type: Sandbox
visibility: Public

name: microsoft-teams-api-sandbox
description: >-
  This is a Microsoft Teams sandbox that uses OpenAPI, Microcks, Bruno, and
  Backstage to provide a 3rd-party REST API and MCP sandbox for Microsoft Teams.

tags:
  - Meetings
  - Chats
  - Microsoft
  - Office

image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png

created: '2026-02-19'
modified: '2026-02-19'

url: https://github.com/naftiko/microsoft-teams-sandbox/blob/main/README.md

apis:

    - aid: microsoft-teams:microsoft-teams-api
      name: Microsooft Teams API
      description: >-
        Working with Microsoft Teams via the Microsoft Graph API, providing a sandbox for working with specific messages and conversations.
      humanURL: https://github.com/naftiko/microsoft-teams-sandbox
      baseURL: http://localhost:8080/rest/microsoft-teams-sandbox/1.0.0
      image: https://naftiko.github.io/docs/images/monogram/monogram_full_color_512.png
      tags:
        - Meetings
        - Chats
        - Microsoft
        - Office
      properties:

        - type: OpenApi
          url: openapi/microsoft-teams-openapi.yaml

        - type: MockRestServer
          url: http://localhost:8080/rest/microsoft-teams-api-sandbox/1.0.0
        - type: MockMCPServer
          url: http://localhost:8080/rest/microsoft-teams-api-sandbox/1.0.0/sse

        - type: OpenCollection
          url: bruno/microsoft-office-copilot-api/opencollection.yml               

