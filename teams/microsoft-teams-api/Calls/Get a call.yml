info:
  name: Get a call
  type: http
  seq: 2
  tags:
    - Calls

http:
  method: GET
  url: "{{baseUrl}}/communications/calls/:call-id"
  params:
    - name: call-id
      value: call-001
      type: path
      description: Unique identifier of the call.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/communications/calls/:call-id"
      method: GET
      params:
        - name: call-id
          value: ""
          type: path
          description: Unique identifier of the call.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "call-001",
            "state": "established",
            "direction": "outgoing",
            "callbackUri": "https://bot.example.com/api/calls",
            "requestedModalities": [
              "audio"
            ],
            "tenantId": "tenant-001"
          }
