info:
  name: Uninstall an app from a team
  type: http
  seq: 3
  tags:
    - AppInstallations

http:
  method: DELETE
  url: "{{baseUrl}}/teams/:team-id/installedApps/:installation-id"
  params:
    - name: team-id
      value: install-001
      type: path
      description: Unique identifier of the team.
    - name: installation-id
      value: install-001
      type: path
      description: Unique identifier of the app installation.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: App uninstalled successfully.
    request:
      url: "{{baseUrl}}/teams/:team-id/installedApps/:installation-id"
      method: DELETE
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
        - name: installation-id
          value: ""
          type: path
          description: Unique identifier of the app installation.
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
