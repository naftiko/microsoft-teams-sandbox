info:
  name: List time cards
  type: http
  seq: 6
  tags:
    - Shifts

http:
  method: GET
  url: "{{baseUrl}}/teams/:team-id/schedule/timeCards"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
    - name: $top
      value: ""
      type: query
      description: Number of items to return.
      disabled: true
    - name: $filter
      value: ""
      type: query
      description: OData filter expression.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/schedule/timeCards"
      method: GET
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
        - name: $top
          value: ""
          type: query
          description: Number of items to return.
          disabled: true
        - name: $filter
          value: ""
          type: query
          description: OData filter expression.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "value": [
              {
                "id": "timecard-001",
                "userId": "user-001",
                "state": "clockedIn",
                "clockInEvent": {
                  "dateTime": "2025-01-22T08:00:00Z",
                  "atApprovedLocation": true
                }
              }
            ]
          }
