info:
  name: Create a shift
  type: http
  seq: 2
  tags:
    - Shifts

http:
  method: POST
  url: "{{baseUrl}}/teams/:team-id/schedule/shifts"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
  body:
    type: json
    data: |-
      {
        "id": "",
        "userId": "",
        "schedulingGroupId": "",
        "sharedShift": {
          "displayName": "",
          "notes": "",
          "startDateTime": "",
          "endDateTime": "",
          "theme": "white",
          "activities": [
            {
              "isPaid": false,
              "startDateTime": "",
              "endDateTime": "",
              "code": "",
              "displayName": ""
            }
          ]
        },
        "draftShift": {},
        "createdDateTime": "",
        "lastModifiedDateTime": "",
        "lastModifiedBy": {
          "application": {
            "id": "",
            "displayName": ""
          },
          "device": {},
          "user": {}
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/schedule/shifts"
      method: POST
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
      body:
        type: json
        data: |-
          {
            "id": "",
            "userId": "",
            "schedulingGroupId": "",
            "sharedShift": {
              "displayName": "",
              "notes": "",
              "startDateTime": "",
              "endDateTime": "",
              "theme": "white",
              "activities": [
                {
                  "isPaid": false,
                  "startDateTime": "",
                  "endDateTime": "",
                  "code": "",
                  "displayName": ""
                }
              ]
            },
            "draftShift": {},
            "createdDateTime": "",
            "lastModifiedDateTime": "",
            "lastModifiedBy": {
              "application": {
                "id": "",
                "displayName": ""
              },
              "device": {},
              "user": {}
            }
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "shift-001",
