info:
  name: Get the attendance report of an online meeting
  type: http
  seq: 6
  tags:
    - OnlineMeetings

http:
  method: GET
  url: "{{baseUrl}}/me/onlineMeetings/:meeting-id/meetingAttendanceReport"
  params:
    - name: meeting-id
      value: "123"
      type: path
      description: Unique identifier of the online meeting.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/me/onlineMeetings/:meeting-id/meetingAttendanceReport"
      method: GET
      params:
        - name: meeting-id
          value: ""
          type: path
          description: Unique identifier of the online meeting.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "report-001",
            "totalParticipantCount": 12,
            "meetingStartDateTime": "2025-01-22T09:00:00Z",
            "meetingEndDateTime": "2025-01-22T10:00:00Z",
            "attendanceRecords": [
              {
                "emailAddress": "jane@example.com",
                "totalAttendanceInSeconds": 3540,
                "role": "Presenter",
                "identity": {
                  "id": "user-001",
                  "displayName": "Jane Smith"
                }
              }
            ]
          }
