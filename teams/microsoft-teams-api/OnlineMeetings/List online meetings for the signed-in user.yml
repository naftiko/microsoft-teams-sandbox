info:
  name: List online meetings for the signed-in user
  type: http
  seq: 1
  tags:
    - OnlineMeetings

http:
  method: GET
  url: "{{baseUrl}}/me/onlineMeetings"
  params:
    - name: $top
      value: ""
      type: query
      description: Number of items to return.
      disabled: true
    - name: $filter
      value: ""
      type: query
      description: OData filter expression.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/me/onlineMeetings"
      method: GET
      params:
        - name: $top
          value: ""
          type: query
          description: Number of items to return.
          disabled: true
        - name: $filter
          value: ""
          type: query
          description: OData filter expression.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "value": [
              {
                "id": "meeting-001",
                "subject": "Sprint Planning",
                "startDateTime": "2025-01-22T09:00:00Z",
                "endDateTime": "2025-01-22T10:00:00Z",
                "joinWebUrl": "https://teams.microsoft.com/l/meetup-join/19%3Ameeting_abc123"
              }
            ]
          }
