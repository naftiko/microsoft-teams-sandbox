info:
  name: Get a workforce integration
  type: http
  seq: 3
  tags:
    - WorkforceIntegrations

http:
  method: GET
  url: "{{baseUrl}}/teamwork/workforceIntegrations/:workforceIntegration-id"
  params:
    - name: workforceIntegration-id
      value: "123"
      type: path
      description: Unique identifier of the workforce integration.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teamwork/workforceIntegrations/:workforceIntegration-id"
      method: GET
      params:
        - name: workforceIntegration-id
          value: ""
          type: path
          description: Unique identifier of the workforce integration.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "wfi-001",
            "displayName": "Kronos Integration",
            "apiVersion": 1,
            "isActive": true,
            "url": "https://kronos.example.com/api/v1/teams",
            "supportedEntities": "shift,timeCard,timeOff"
          }
