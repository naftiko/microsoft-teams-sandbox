opencollection: 1.0.0

info:
  name: microsoft-teams-api

request:
  auth:
    type: oauth2
    flow: authorization_code
    authorizationUrl: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
    accessTokenUrl: https://login.microsoftonline.com/common/oauth2/v2.0/token
    refreshTokenUrl: "{{oauth_refresh_url}}"
    callbackUrl: "{{oauth_callback_url}}"
    credentials:
      clientId: "{{oauth_client_id}}"
      clientSecret: "{{oauth_client_secret}}"
      placement: header
    scope: Team.ReadBasic.All Team.Create Channel.ReadBasic.All Channel.Create Group.Read.All Group.ReadWrite.All TeamsTab.ReadWrite.All TeamsAppInstallation.ReadWriteForTeam AppCatalog.ReadWrite.All Chat.ReadWrite ChatMessage.Send TeamworkTag.ReadWrite Calls.Initiate.All Calls.AccessMedia.All CallRecords.Read.All OnlineMeetings.ReadWrite Presence.Read.All Schedule.ReadWrite.All WorkforceIntegration.ReadWrite.All LearningContent.ReadWrite.All
    state: "{{oauth_state}}"
    tokenConfig:
      placement:
        header: Bearer
    settings:
      autoFetchToken: false
      autoRefreshToken: true
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
