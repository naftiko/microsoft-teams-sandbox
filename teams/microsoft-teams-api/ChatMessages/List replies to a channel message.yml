info:
  name: List replies to a channel message
  type: http
  seq: 5
  tags:
    - ChatMessages

http:
  method: GET
  url: "{{baseUrl}}/teams/:team-id/channels/:channel-id/messages/:message-id/replies"
  params:
    - name: team-id
      value: team-001
      type: path
      description: Unique identifier of the team.
    - name: channel-id
      value: channel-001
      type: path
      description: Unique identifier of the channel.
    - name: message-id
      value: message-001
      type: path
      description: Unique identifier of the message.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/channels/:channel-id/messages/:message-id/replies"
      method: GET
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
        - name: channel-id
          value: ""
          type: path
          description: Unique identifier of the channel.
        - name: message-id
          value: ""
          type: path
          description: Unique identifier of the message.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "value": [
              {
                "id": "msg-001",
                "messageType": "message",
                "createdDateTime": "2025-01-20T14:30:00Z",
                "body": {
                  "contentType": "text",
                  "content": "Hello team, let's sync up on the project status."
                },
                "from": {
                  "user": {
                    "id": "user-001",
                    "displayName": "Jane Smith"
                  }
                },
                "importance": "normal"
              }
            ]
          }
