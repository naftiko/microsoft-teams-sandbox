info:
  name: Send a message to a channel
  type: http
  seq: 4
  tags:
    - ChatMessages

http:
  method: POST
  url: "{{baseUrl}}/teams/:team-id/channels/:channel-id/messages"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
    - name: channel-id
      value: "channel-001"
      type: path
      description: Unique identifier of the channel.
  body:
    type: json
    data: |-
      {
        "id": "",
        "messageType": "message",
        "createdDateTime": "",
        "lastModifiedDateTime": "",
        "subject": "",
        "body": {
          "contentType": "text",
          "content": ""
        },
        "from": {
          "application": {
            "id": "",
            "displayName": ""
          },
          "device": {},
          "user": {}
        },
        "importance": "normal",
        "attachments": [
          {
            "id": "",
            "contentType": "",
            "contentUrl": "",
            "content": "",
            "name": ""
          }
        ],
        "mentions": [
          {
            "id": 0,
            "mentionText": "",
            "mentioned": {}
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/channels/:channel-id/messages"
      method: POST
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
        - name: channel-id
          value: ""
          type: path
          description: Unique identifier of the channel.
      body:
        type: json
        data: |-
          {
            "id": "",
            "messageType": "message",
            "createdDateTime": "",
            "lastModifiedDateTime": "",
            "subject": "",
            "body": {
              "contentType": "text",
              "content": ""
            },
            "from": {
              "application": {
                "id": "",
                "displayName": ""
              },
              "device": {},
              "user": {}
            },
            "importance": "normal",
            "attachments": [
              {
                "id": "",
                "contentType": "",
                "contentUrl": "",
                "content": "",
                "name": ""
              }
            ],
            "mentions": [
              {
                "id": 0,
                "mentionText": "",
                "mentioned": {}
              }
            ]
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
