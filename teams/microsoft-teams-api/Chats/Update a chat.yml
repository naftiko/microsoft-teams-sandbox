info:
  name: Update a chat
  type: http
  seq: 4
  tags:
    - Chats

http:
  method: PATCH
  url: "{{baseUrl}}/chats/:chat-id"
  params:
    - name: chat-id
      value: "chat-001"
      type: path
      description: Unique identifier of the chat.
  body:
    type: json
    data: |-
      {
        "id": "",
        "topic": "",
        "chatType": "oneOnOne",
        "createdDateTime": "",
        "lastUpdatedDateTime": "",
        "members": [
          {
            "id": "",
            "displayName": "",
            "roles": [],
            "user@odata.bind": ""
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/chats/:chat-id"
      method: PATCH
      params:
        - name: chat-id
          value: ""
          type: path
          description: Unique identifier of the chat.
      body:
        type: json
        data: |-
          {
            "id": "",
            "topic": "",
            "chatType": "oneOnOne",
            "createdDateTime": "",
            "lastUpdatedDateTime": "",
            "members": [
              {
                "id": "",
                "displayName": "",
                "roles": [],
                "user@odata.bind": ""
              }
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "19:chat-abc123@thread.v2",
            "topic": "Project Discussion",
            "chatType": "group",
            "createdDateTime": "2025-01-15T09:00:00Z",
            "lastUpdatedDateTime": "2025-01-20T14:30:00Z"
          }
