info:
  name: Get a tag
  type: http
  seq: 3
  tags:
    - Tags

http:
  method: GET
  url: "{{baseUrl}}/teams/:team-id/tags/:tag-id"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
    - name: tag-id
      value: "123"
      type: path
      description: Unique identifier of the tag.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/tags/:tag-id"
      method: GET
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
        - name: tag-id
          value: ""
          type: path
          description: Unique identifier of the tag.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "tag-001",
            "displayName": "Frontend Developers",
            "description": "All frontend team members",
            "memberCount": 5,
            "tagType": "standard"
          }
