info:
  name: Get a call record
  type: http
  seq: 2
  tags:
    - CallRecords

http:
  method: GET
  url: "{{baseUrl}}/communications/callRecords/:callRecord-id"
  params:
    - name: callRecord-id
      value: "call-record-001"
      type: path
      description: Unique identifier of the call record.
    - name: $expand
      value: ""
      type: query
      description: Comma-separated list of relationships to expand.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/communications/callRecords/:callRecord-id"
      method: GET
      params:
        - name: callRecord-id
          value: ""
          type: path
          description: Unique identifier of the call record.
        - name: $expand
          value: ""
          type: query
          description: Comma-separated list of relationships to expand.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "callrecord-001",
            "version": 1,
            "type": "peerToPeer",
            "modalities": [
              "audio"
            ],
            "startDateTime": "2025-01-20T14:00:00Z",
            "endDateTime": "2025-01-20T14:30:00Z",
            "organizer": {
              "user": {
                "id": "user-001",
                "displayName": "Jane Smith"
              }
            }
          }
