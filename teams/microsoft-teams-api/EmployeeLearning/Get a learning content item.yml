info:
  name: Get a learning content item
  type: http
  seq: 8
  tags:
    - EmployeeLearning

http:
  method: GET
  url: "{{baseUrl}}/employeeExperience/learningProviders/:learningProvider-id/learningContents/:learningContent-id"
  params:
    - name: learningProvider-id
      value: "123"
      type: path
      description: Unique identifier of the learning provider.
    - name: learningContent-id
      value: "123"
      type: path
      description: Unique identifier of the learning content.
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/employeeExperience/learningProviders/:learningProvider-id/learningContents/:learningContent-id"
      method: GET
      params:
        - name: learningProvider-id
          value: ""
          type: path
          description: Unique identifier of the learning provider.
        - name: learningContent-id
          value: ""
          type: path
          description: Unique identifier of the learning content.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "content-001",
            "externalId": "course-python-101",
            "title": "Introduction to Python",
            "description": "Learn the basics of Python programming",
            "contentWebUrl": "https://learning.example.com/courses/python-101",
            "languageTag": "en-US",
            "duration": "PT2H30M",
            "format": "video",
            "level": "Beginner",
            "isActive": true,
            "isSearchable": true
          }
