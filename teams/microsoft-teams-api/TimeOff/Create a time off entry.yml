info:
  name: Create a time off entry
  type: http
  seq: 2
  tags:
    - TimeOff

http:
  method: POST
  url: "{{baseUrl}}/teams/:team-id/schedule/timesOff"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
  body:
    type: json
    data: |-
      {
        "id": "",
        "userId": "",
        "sharedTimeOff": {
          "timeOffReasonId": "",
          "startDateTime": "",
          "endDateTime": "",
          "theme": ""
        },
        "draftTimeOff": {},
        "createdDateTime": "",
        "lastModifiedDateTime": "",
        "lastModifiedBy": {
          "application": {
            "id": "",
            "displayName": ""
          },
          "device": {},
          "user": {}
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/schedule/timesOff"
      method: POST
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
