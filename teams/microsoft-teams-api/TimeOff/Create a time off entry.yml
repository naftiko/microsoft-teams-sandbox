        data: |-
          {
            "id": "",
            "userId": "",
            "sharedTimeOff": {
              "timeOffReasonId": "",
              "startDateTime": "",
              "endDateTime": "",
              "theme": ""
            },
            "draftTimeOff": {},
            "createdDateTime": "",
            "lastModifiedDateTime": "",
            "lastModifiedBy": {
              "application": {
                "id": "",
                "displayName": ""
              },
              "device": {},
              "user": {}
            }
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
