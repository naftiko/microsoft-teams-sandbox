info:
  name: List time off entries
  type: http
  seq: 1
  tags:
    - TimeOff

http:
  method: GET
  url: "{{baseUrl}}/teams/:team-id/schedule/timesOff"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
    - name: $top
      value: ""
      type: query
      description: Number of items to return.
      disabled: true
    - name: $filter
      value: ""
      type: query
      description: OData filter expression.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/schedule/timesOff"
      method: GET
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
        - name: $top
          value: ""
          type: query
          description: Number of items to return.
          disabled: true
        - name: $filter
          value: ""
          type: query
          description: OData filter expression.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "value": [
              {
                "id": "timeoff-001",
                "userId": "user-001",
                "sharedTimeOff": {
                  "timeOffReasonId": "reason-001",
                  "startDateTime": "2025-02-01T00:00:00Z",
                  "endDateTime": "2025-02-03T00:00:00Z"
                }
              }
            ]
          }
