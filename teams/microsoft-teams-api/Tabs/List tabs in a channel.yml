info:
  name: List tabs in a channel
  type: http
  seq: 1
  tags:
    - Tabs

http:
  method: GET
  url: "{{baseUrl}}/teams/:team-id/channels/:channel-id/tabs"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
    - name: channel-id
      value: "channel-001"
      type: path
      description: Unique identifier of the channel.
    - name: $filter
      value: ""
      type: query
      description: OData filter expression.
      disabled: true
    - name: $expand
      value: ""
      type: query
      description: Comma-separated list of relationships to expand.
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Successful response
    request:
      url: "{{baseUrl}}/teams/:team-id/channels/:channel-id/tabs"
      method: GET
      params:
        - name: team-id
          value: ""
          type: path
          description: Unique identifier of the team.
        - name: channel-id
          value: ""
          type: path
          description: Unique identifier of the channel.
        - name: $filter
          value: ""
          type: query
          description: OData filter expression.
          disabled: true
        - name: $expand
          value: ""
          type: query
          description: Comma-separated list of relationships to expand.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "value": [
              {
                "id": "tab-id-001",
                "displayName": "Project Wiki",
                "webUrl": "https://teams.microsoft.com/l/entity/com.microsoft.teamspace.tab.wiki"
              },
              {
                "id": "tab-id-002",
                "displayName": "Task Board",
                "webUrl": "https://teams.microsoft.com/l/entity/com.microsoft.teamspace.tab.planner"
              }
            ]
          }
