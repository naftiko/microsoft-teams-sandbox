http:
  method: PATCH
  url: "{{baseUrl}}/teams/:team-id/channels/:channel-id/tabs/:tab-id"
  params:
    - name: team-id
      value: "team-001"
      type: path
      description: Unique identifier of the team.
    - name: channel-id
      value: "channel-001"
      type: path
      description: Unique identifier of the channel.
    - name: tab-id
      value: "123"
      type: path
      description: Unique identifier of the tab.
  body:
    type: json
    data: |-
      {
        "id": "",
        "displayName": "",
        "webUrl": "",
        "configuration": {
          "entityId": "",
          "contentUrl": "",
          "removeUrl": "",
          "websiteUrl": ""
        },
        "teamsApp@odata.bind": ""
      }
  auth: inherit

settings:
